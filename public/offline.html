<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>224Solutions - Mode Hors Ligne</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .offline-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      text-align: center;
      max-width: 500px;
      width: 100%;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    h1 {
      color: #2c3e50;
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #7f8c8d;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.35);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .btn.shake {
      animation: shake 0.45s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .status {
      margin-top: 30px;
      padding: 15px;
      background: #ecf0f1;
      border-radius: 10px;
      font-size: 14px;
      color: #7f8c8d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 260px;
    }

    .status.online {
      background: #d4edda;
      color: #155724;
    }

    .status.checking {
      background: #fff3cd;
      color: #856404;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e74c3c;
      animation: blink 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    .status.online .dot {
      background: #27ae60;
      animation: none;
    }

    .status.checking .dot {
      background: #f39c12;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="icon">📡</div>
    <h1>Mode Hors Ligne</h1>
    <p>
      Vous n'êtes pas connecté à Internet. Certaines fonctionnalités peuvent être limitées.
      Reconnectez-vous pour profiter de toutes les fonctionnalités de 224Solutions.
    </p>

    <button class="btn" id="retryBtn" type="button">
      🔄 Réessayer
    </button>

    <div class="status" id="status">
      <span class="dot"></span>
      <span id="statusText">Connexion indisponible</span>
    </div>
  </div>

  <script>
    (function () {
      const APP_BASE = '/';
      const statusEl = document.getElementById('status');
      const statusTextEl = document.getElementById('statusText');
      const retryBtn = document.getElementById('retryBtn');

      function setStatus(type, message) {
        statusEl.className = 'status' + (type ? ' ' + type : '');
        statusTextEl.textContent = message;
      }

      function shakeButton() {
        retryBtn.classList.remove('shake');
        void retryBtn.offsetWidth;
        retryBtn.classList.add('shake');
      }

      async function verifyConnection() {
        retryBtn.disabled = true;
        setStatus('checking', 'Vérification de la connexion...');

        try {
          const response = await fetch(APP_BASE, {
            method: 'HEAD',
            cache: 'no-store'
          });

          if (response.ok) {
            setStatus('online', 'Connexion rétablie ! Redirection...');
            setTimeout(() => {
              window.location.href = APP_BASE;
            }, 800);
            return;
          }

          setStatus('', 'Toujours hors ligne. Vérifiez votre connexion.');
          shakeButton();
        } catch (error) {
          setStatus('', 'Toujours hors ligne. Vérifiez votre connexion.');
          shakeButton();
        } finally {
          retryBtn.disabled = false;
        }
      }

      retryBtn.addEventListener('click', verifyConnection);

      window.addEventListener('online', () => {
        setStatus('checking', 'Connexion détectée, vérification...');
        verifyConnection();
      });

      window.addEventListener('offline', () => {
        setStatus('', 'Connexion perdue');
      });
    })();
  </script>
</body>
</html>
