<body>
  <div id="root"></div>

    <div class="text">Chargement...</div>
  </div>

  <!-- Preview hotfix (optionnel): désenregistrer SW + vider caches -->
  <!--
    IMPORTANT:
    - Ce reset empêche l'installation PWA si on le fait à chaque visite.
    - On l'active seulement si on ajoute ?resetSw=1 à l'URL.
  -->
  <script>
    (function () {
      var isLovablePreview = location.hostname.indexOf('lovableproject.com') !== -1;
      if (!isLovablePreview) return;

      var params = new URLSearchParams(location.search);
      if (!params.has('resetSw')) return;

      function safe(p) { return p && typeof p.then === 'function' ? p : Promise.resolve(); }

      safe(
        (async function () {
          try {
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all((regs || []).map(function (r) { return r.unregister(); }));
            }
            if ('caches' in window) {
              var keys = await caches.keys();
              await Promise.all((keys || []).map(function (k) { return caches.delete(k); }));
            }
          } catch (e) {
            // ignore
          }
        })()
      ).finally(function () {
        // Recharge une fois pour repartir sur des bundles propres
        location.replace(location.pathname + location.hash);
      });
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
  
  <script>
    // Hide loader when app is ready - ultra simple version
    (function() {
      var loader = document.getElementById('app-loader');
      var maxWait = 10000; // 10 seconds max
      
      function hide() {
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function() { 
            if (loader) loader.style.display = 'none'; 
          }, 400);
        }
      }
      
      // Check if React mounted
      function check() {
        var root = document.getElementById('root');
        return root && root.innerHTML.length > 50;
      }
      
      // Poll every 100ms
      var interval = setInterval(function() {
        if (check()) {
          clearInterval(interval);
          hide();
        }
      }, 100);
      
      // Force hide after max wait
      setTimeout(function() {
        clearInterval(interval);
        hide();
      }, maxWait);
      
      // Expose globally for manual hide
      window.__hideLoader = hide;
    })();
  </script>
