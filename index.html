  <!-- Preview hotfix (optionnel): désenregistrer SW + vider caches -->
  <!--
    IMPORTANT:
    - Ce reset empêche l'installation PWA si on le fait à chaque visite.
    - On l'active seulement si on ajoute ?resetSw=1 à l'URL.
  -->
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      if (!params.has('resetSw')) return;

      console.log('[PWA Reset] Cleaning SW + caches on', location.hostname);

      (async function () {
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all((regs || []).map(function (r) { return r.unregister(); }));
            console.log('[PWA Reset] SW unregistered:', regs.length);
          }
          if ('caches' in window) {
            var keys = await caches.keys();
            await Promise.all((keys || []).map(function (k) { return caches.delete(k); }));
            console.log('[PWA Reset] Caches cleared:', keys.length);
          }
        } catch (e) {
          console.warn('[PWA Reset] Error:', e);
        }
        // Reload without resetSw param
        var clean = new URL(location.href);
        clean.searchParams.delete('resetSw');
        clean.searchParams.delete('__reload');
        location.replace(clean.pathname + clean.search + clean.hash || '/');
      })();
    })();
  </script>

  <script>
    // Polyfill Node.js globals pour amazon-cognito-identity-js
    if (typeof globalThis.global === 'undefined') { globalThis.global = globalThis; }
    if (typeof globalThis.process === 'undefined') { globalThis.process = { env: {}, version: '' }; }
  </script>
  <script type="module" src="/src/main.tsx"></script>
  
  <script>
    // Hide loader when app is ready + error recovery
    (function() {
      var loader = document.getElementById('app-loader');
      var textEl = loader && loader.querySelector('.text');
      var maxWait = 15000;
      
      function hide() {
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function() { if (loader) loader.style.display = 'none'; }, 400);
        }
      }
      
      function check() {
        var root = document.getElementById('root');
        return root && root.innerHTML.length > 50;
      }
      
      var interval = setInterval(function() {
        if (check()) { clearInterval(interval); hide(); }
      }, 200);
      
      // After max wait, show error + reload option
      setTimeout(function() {
        clearInterval(interval);
        if (!check() && loader && textEl) {
          textEl.innerHTML = 'Le chargement prend plus de temps que prévu.<br><a href="/?resetSw=1" style="color:#023288;text-decoration:underline;margin-top:8px;display:inline-block">Recharger l\'application</a>';
        } else {
          hide();
        }
      }, maxWait);
      
      window.__hideLoader = hide;

      // Global error handler - show error in loader
      window.addEventListener('error', function(e) {
        if (textEl && !check()) {
          textEl.innerHTML = 'Erreur de chargement.<br><a href="/?resetSw=1" style="color:#023288;text-decoration:underline;margin-top:8px;display:inline-block">Recharger</a>';
        }
      });
    })();
  </script>
