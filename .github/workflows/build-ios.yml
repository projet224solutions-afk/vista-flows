name: Build iOS IPA

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build React app
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "❌ Missing Supabase env vars for frontend build"
            echo "Define one of: secrets/vars VITE_SUPABASE_URL or SUPABASE_URL"
            echo "Define one of: secrets/vars VITE_SUPABASE_ANON_KEY or SUPABASE_ANON_KEY"
            exit 1
          fi
          npm run build
          echo "React app built successfully"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL || vars.SUPABASE_URL || 'https://uakkxaibujzxdiqzpnpr.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || vars.VITE_SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY || vars.VITE_SUPABASE_PUBLISHABLE_KEY || vars.SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVha2t4YWlidWp6eGRpcXpwbnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkwMDA2NTcsImV4cCI6MjA3NDU3NjY1N30.kqYNdg-73BTP0Yht7kid-EZu2APg9qw-b_KW9z5hJbM' }}
          VITE_BACKEND_MOBILE_URL: ${{ secrets.VITE_BACKEND_MOBILE_URL || secrets.VITE_BACKEND_URL || vars.VITE_BACKEND_MOBILE_URL || vars.VITE_BACKEND_URL || '' }}
          
      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            echo "iOS project directory already exists, skipping cap add"
          fi
          npx cap sync ios

      - name: Resolve iOS app directory
        id: ios-path
        run: |
          PODFILE_DIR=$(find ios -name Podfile -type f | head -n 1 | xargs -I {} dirname {})
          if [ -z "$PODFILE_DIR" ]; then
            echo "❌ No Podfile found after Capacitor sync"
            find ios -maxdepth 4 -type f | head -n 50
            exit 1
          fi
          echo "Detected iOS app dir: $PODFILE_DIR"
          echo "app_dir=$PODFILE_DIR" >> "$GITHUB_OUTPUT"
          
      - name: Install CocoaPods
        run: |
          cd "${{ steps.ios-path.outputs.app_dir }}"
          pod install
          
      - name: Import Code-Signing Certificates
        if: github.event_name != 'pull_request'
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
          
      - name: Download Provisioning Profile
        if: github.event_name != 'pull_request'
        uses: Apple-Actions/download-provisioning-profiles@v1
        with:
          bundle-id: com.224solutions.app
          profile-type: 'IOS_APP_STORE'
          issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          
      - name: Build iOS Archive
        run: |
          cd "${{ steps.ios-path.outputs.app_dir }}"
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $PWD/build/App.xcarchive \
            archive
            
      - name: Create ExportOptions.plist
        if: github.event_name != 'pull_request'
        run: |
          cd "${{ steps.ios-path.outputs.app_dir }}"
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        if: github.event_name != 'pull_request'
        run: |
          cd "${{ steps.ios-path.outputs.app_dir }}"
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build/ipa
          
      - name: Upload IPA artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: 224solutions-ios-ipa
          path: ${{ steps.ios-path.outputs.app_dir }}/build/ipa/*.ipa
          retention-days: 30
          
      - name: Upload to TestFlight
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Apple-Actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.ios-path.outputs.app_dir }}/build/ipa/App.ipa
          issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ios-v${{ github.run_number }}
          name: 224Solutions iOS v${{ github.run_number }}
          body: |
            🍎 **Version iOS Automatique**
            
            📱 **Installation:**
            1. Téléchargez via TestFlight (lien dans l'email)
            2. Ou installez l'IPA via Xcode/AltStore
            
            🚀 **Fonctionnalités:**
            - Interface bureau syndicat native iOS
            - Gestion des taxi-motards avec badges
            - Wallet intégré avec transactions
            - Authentification Touch ID/Face ID
            - Notifications push
            - Mode hors ligne
            
            📊 **Build:** ${{ github.sha }}
            🕒 **Date:** ${{ github.event.head_commit.timestamp }}
          files: ios/App/build/ipa/*.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
