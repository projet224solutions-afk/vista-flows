name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_SUPABASE_URL: ''
  VITE_SUPABASE_ANON_KEY: ''
  VITE_BACKEND_MOBILE_URL: ''
  ANDROID_KEYSTORE_B64: ''
  KEYSTORE_PASSWORD: ''
  KEY_ALIAS: ''
  KEY_PASSWORD: ''

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install dependencies
        run: npm ci

      - name: Resolve workflow env
        shell: bash
        env:
          RAW_VARS: ${{ toJson(vars) }}
          RAW_SECRETS: ${{ toJson(secrets) }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const varsObj = JSON.parse(process.env.RAW_VARS || '{}');
          const secretsObj = JSON.parse(process.env.RAW_SECRETS || '{}');
          const pick = (...keys) => {
            for (const key of keys) {
              const value = secretsObj[key] ?? varsObj[key] ?? '';
              if (String(value).trim()) return String(value);
            }
            return '';
          };
          const entries = {
            VITE_SUPABASE_URL: pick('VITE_SUPABASE_URL', 'SUPABASE_URL'),
            VITE_SUPABASE_ANON_KEY: pick('VITE_SUPABASE_ANON_KEY', 'SUPABASE_ANON_KEY', 'VITE_SUPABASE_PUBLISHABLE_KEY', 'SUPABASE_PUBLISHABLE_KEY'),
            VITE_BACKEND_MOBILE_URL: pick('VITE_BACKEND_MOBILE_URL', 'VITE_BACKEND_URL'),
            ANDROID_KEYSTORE_B64: pick('ANDROID_KEYSTORE'),
            KEYSTORE_PASSWORD: pick('KEYSTORE_PASSWORD'),
            KEY_ALIAS: pick('KEY_ALIAS'),
            KEY_PASSWORD: pick('KEY_PASSWORD'),
          };
          for (const [key, value] of Object.entries(entries)) {
            fs.appendFileSync(process.env.GITHUB_ENV, `${key}<<__ENV__\n${value}\n__ENV__\n`);
          }
          EOF

      - name: Build React app
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "❌ Missing Supabase env vars for frontend build"
            echo "Define one of: secrets/vars VITE_SUPABASE_URL or SUPABASE_URL"
            echo "Define one of: secrets/vars VITE_SUPABASE_ANON_KEY or SUPABASE_ANON_KEY"
            exit 1
          fi
          npm run build
          echo "React app built successfully"
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create Capacitor Android project
        run: |
          npm install -g @capacitor/cli
          npx cap add android
          npx cap sync android
          
      - name: Build Android APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
          
      - name: Sign APK
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "❌ Android signing secrets are missing"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/keystore.jks
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
            
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 224solutions-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-v${{ github.run_number }}
          name: 224Solutions Android v${{ github.run_number }}
          body: |
            🤖 **Version Android Automatique**
            
            📱 **Installation:**
            1. Téléchargez le fichier APK
            2. Activez "Sources inconnues" dans les paramètres Android
            3. Installez l'APK
            
            🚀 **Fonctionnalités:**
            - Interface bureau syndicat complète
            - Gestion des taxi-motards avec badges
            - Wallet intégré avec transactions
            - Authentification sécurisée
            - Mode hors ligne
            
            📊 **Build:** ${{ github.sha }}
            🕒 **Date:** ${{ github.event.head_commit.timestamp }}
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
